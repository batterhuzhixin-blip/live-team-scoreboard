services:
  - type: web
    name: live-team-scoreboard
    runtime: node
    plan: starter
    region: singapore
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: DATA_DIR
        value: /var/data
    disk:
      name: scoreboard-data
      mountPath: /var/data
      sizeGB: 1
